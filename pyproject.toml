[tool.briefcase]
project_name = "QClaw ADB Tool"
bundle = "org.qclaw"
version = "1.0.0"
url = "https://github.com/MathsProblem/qclaw-adb-tool"
license = {file = "LICENSE"}
author = "QClaw"
author_email = "qclaw@example.com"

[tool.briefcase.app.qclaw_adb]
formal_name = "QClaw ADB Tool"
description = "Android ADB Management Tool"
long_description = """A powerful ADB management tool for Android devices."""
icon = "resources/icon"
sources = ["src/qclaw_adb"]
